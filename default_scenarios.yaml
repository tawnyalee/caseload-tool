scenarios:
  approval:
    hotkey: F2
    close_tab_after: true
    find_first: false
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email from Student
      body: Task 1 approval sent for review
      academic_activities:
      - Course/Program Information Discussed
      - Course/Program Information Requested
      submit: true
      append_clipboard: false
      enter_additional_text: false
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: Task 1 approval form approved and emailed. Task 2 info sent.
      academic_activities: []
      submit: true
      append_clipboard: false
      enter_additional_text: false
  flup email:
    hotkey: Ctrl+Shift+S
    close_tab_after: true
    find_first: false
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email from Student
      body: 'em exchange with st: '
      academic_activities:
      - Course/Program Information Discussed
      - Course/Program Information Requested
      submit: true
      append_clipboard: true
      enter_additional_text: true
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: 'em exchange with st: '
      academic_activities: []
      submit: true
      append_clipboard: false
      enter_additional_text: false
  followup to call:
    hotkey: F5
    close_tab_after: true
    find_first: true
    notes:
    - interaction_format: Single Interaction
      interaction_type: Live Call
      body: Followup call completed.
      academic_activities:
      - Course/Program Information Discussed
      - Course/Program Information Requested
      submit: false
      append_clipboard: false
      enter_additional_text: false
    email:
      subject: Following up on our call, {{first_name}}
      body_html_file: sample_followup.html
      to: ''
      signature_file: ''
      inline_images: []
      cc_pm: false
  welcome-C769:
    hotkey: ''
    close_tab_after: true
    find_first: false
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: 'welcome em with Task 1 guidance sent. '
      academic_activities: []
      submit: true
      append_clipboard: false
      enter_additional_text: false
    email:
      subject: Welcome C769 email from your course faculty
      body_html_file: C769-welcome.html
      to: ''
      signature_file: WGU (your.email@wgu.edu)
      inline_images:
      - image001.png
      cc_pm: true
    batch:
      filters:
      - column: Last Assigned CI Contact
        op: is empty
        value: ''
      - column: Course Code
        op: is
        value: C769
      preview: true
  outreach-C769:
    hotkey: ''
    close_tab_after: true
    find_first: false
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email from Student
      body: testing outreach batch. Ill bet out
      academic_activities: []
      submit: false
      append_clipboard: false
      enter_additional_text: false
    email:
      subject: ''
      body_html_file: welcome-C769-2.html
      to: your.email@wgu.edu
      signature_file: ''
      inline_images: []
      cc_pm: false
      font_size: 12
    batch:
      filters:
      - column: Course Code
        op: is
        value: C769
      preview: true
  new_task1_policy-batch:
    hotkey: ''
    close_tab_after: true
    find_first: false
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: outreach email. with new Task 1 policy
      academic_activities: []
      submit: true
      append_clipboard: false
      enter_additional_text: false
    email:
      subject: New D502 Task 1 approval form policy
      body_html_file: task 1 D502 policy.html
      to: ''
      signature_file: WGU (your.email@wgu.edu)
      inline_images: []
      cc_pm: true
    batch:
      filters:
      - column: Course Code
        op: is
        value: D502
      - column: Task1
        op: is empty
        value: ''
      preview: true
groups:
- name: basic
  color: '#239a8e'
  scenarios:
  - approval
  - flup email
  - followup to call
- name: C769 Batch Actions
  color: '#c08a25'
  scenarios:
  - welcome-C769
  - outreach-C769
  - new_task1_policy-batch
